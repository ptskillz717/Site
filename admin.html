<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PLATINUM COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; color:#fff; font-family:'Rajdhani',sans-serif; height:100vh; display:flex; overflow:hidden; }
        #sidebar { width:260px; background:#111; border-right:1px solid #333; display:flex; flex-direction:column; flex-shrink:0; }
        .tab-btn { padding:15px; cursor:pointer; border-bottom:1px solid #222; font-family:'Orbitron'; color:#666; transition:0.2s; font-size: 0.8rem; letter-spacing: 1px; }
        .tab-btn:hover { color:white; background:#222; }
        .tab-btn.active { color:#00f3ff; border-left:4px solid #00f3ff; background:#1a1a1a; }
        #main { flex:1; position:relative; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        .view-panel { display:none; height:100%; padding:20px; box-sizing:border-box; overflow-y:auto; }
        .view-panel.active { display:flex; flex-direction:row; gap:20px; }
        .col-left { width: 320px; display:flex; flex-direction:column; gap:20px; flex-shrink:0; }
        .col-right { flex:1; display:flex; flex-direction:column; gap:20px; overflow-y:auto; padding-right:5px; }
        .panel { background:#151515; border:1px solid #333; padding:20px; border-radius:8px; flex-shrink:0; }
        h3 { margin-top:0; font-family:'Orbitron'; font-size:1rem; color:#888; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:10px; }
        #clientList { flex:1; overflow-y:auto; min-height:200px; border:1px solid #222; background:#0a0a0a; padding:5px; }
        .row { padding:15px; border-bottom:1px solid #222; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
        .row:hover { background:#222; color:#00f3ff; }
        .row.active { border-left:3px solid #00f3ff; background:#1a1a1a; color:#00f3ff; }
        .client-meta { display: block; font-size: 0.8rem; color: #666; margin-top: 4px; line-height: 1.4; }
        .client-meta span { display: block; }
        .client-meta a { color: #00f3ff; text-decoration: none; }
        .del-btn { color:red; cursor:pointer; font-weight:bold; padding:0 5px; }
        #chatFeed { height:250px; overflow-y:auto; background:#000; border:1px solid #333; padding:15px; margin-bottom:10px; border-radius:4px; }
        .msg { padding:8px 12px; border-radius:8px; margin-bottom:5px; font-size:0.9rem; max-width:80%; }
        .msg.admin { background:#222; border-left:3px solid #00f3ff; color:#fff; align-self:flex-start; }
        .msg.client { background:#1a1a1a; border-right:3px solid #d900ff; color:#ccc; align-self:flex-end; text-align:right; margin-left:auto; }
        #fList { max-height:200px; overflow-y:auto; background:#000; padding:10px; border:1px solid #333; }
        .file-row { display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid #222; font-size:0.9rem; }
        .d-btn { color:#0f0; text-decoration:none; border:1px solid #0f0; padding:2px 5px; font-size:0.7rem; }
        input, textarea { background:#000; border:1px solid #444; color:#fff; padding:10px; width:100%; box-sizing:border-box; margin-bottom:5px; }
        button { background:#00f3ff; border:none; padding:10px; font-weight:bold; cursor:pointer; width:100%; margin-top:5px; color:#000; font-family:'Orbitron'; }
        .status-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .stat-btn { padding: 10px; border: 1px solid #333; background: #000; color: #666; cursor: pointer; font-family: 'Orbitron'; font-size:0.8rem; }
        .stat-btn.active { border-color: #00f3ff; background: rgba(0, 243, 255, 0.1); color: #00f3ff; }
        #lockScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .draggable { cursor: grab; background: #111; border: 1px solid #333; padding: 5px; }
        .thumb { width: 100%; height: 80px; object-fit: cover; }
        .lead-row { padding:15px; border-bottom:1px solid #222; background:#151515; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; }
        .lead-info strong { display:block; color:#fff; font-size:1rem; }
        .lead-info small { display:block; color:#888; font-size:0.8rem; margin-top:2px; }
        .action-btn { cursor:pointer; padding:4px 8px; border-radius:4px; margin-left:5px; border:1px solid #444; font-size:0.8rem; }
        .btn-edit { color:#ffd700; border-color:#ffd700; }
        .btn-email { color:#00f3ff; border-color:#00f3ff; }
        .btn-make { border-color:#0f0; color:#0f0; }
        .btn-sms { border-color:#d900ff; color:#d900ff; }
        iframe { width:100%; height:100%; border:none; background:white; }
    </style>
</head>
<body>

<div id="lockScreen">
    <h1 style="font-family:'Orbitron'; color:#00f3ff;">PLATINUM ACCESS</h1>
    <input type="password" id="pinInput" placeholder="PIN" style="width:200px; text-align:center;" onkeypress="if(event.key==='Enter') checkPin()">
    <button onclick="checkPin()" style="width:200px; margin-top:10px;">UNLOCK</button>
</div>

<div id="sidebar">
    <div class="tab-btn active" onclick="showTab('clients')">CLIENTS & CHAT</div>
    <div class="tab-btn" onclick="showTab('leads')">LEADS & PROMOS</div>
    <div class="tab-btn" onclick="showTab('database')">DATABASE DATA</div>
    <div class="tab-btn" onclick="showTab('producer')">PRODUCER HUB</div>
    <div class="tab-btn" onclick="showTab('gallery')">GALLERY MANAGER</div>
    <div class="tab-btn" onclick="showTab('audio')">AUDIO CONFIG</div>
    <div class="tab-btn" onclick="showTab('live')">LIVE CONFIG</div>
    <div class="tab-btn" onclick="showTab('builder')">WEBSITE EDITOR</div>
    <div style="flex:1;"></div>
    <div style="padding:15px; font-size:0.7rem; color:#444; text-align:center;">PLATINUM OS v22.0</div>
</div>

<div id="main">
    <div id="view-clients" class="view-panel active">
        <div class="col-left">
            <div class="panel" style="height:100%; display:flex; flex-direction:column;">
                <h3 style="color:#00f3ff">CLIENT LIST</h3>
                <div id="clientList">Scanning...</div>
                <div style="margin-top:10px;"><input id="newC" placeholder="New Client Name"><button onclick="mkC()" style="background:#d900ff;">+ CREATE</button></div>
            </div>
        </div>
        <div class="col-right">
            <div class="panel">
                <h3 style="color:#fff">ACTIVE: <span id="codeDisp" style="color:#00f3ff">NONE</span></h3>
                <div class="status-controls">
                    <button class="stat-btn" onclick="setStatus('WAITING')" id="btn-WAITING">⏳ WAIT</button>
                    <button class="stat-btn" onclick="setStatus('RECEIVED')" id="btn-RECEIVED">📥 GOT IT</button>
                    <button class="stat-btn" onclick="setStatus('PROGRESS')" id="btn-PROGRESS">⚡ WORK</button>
                    <button class="stat-btn" onclick="setStatus('READY')" id="btn-READY">✅ READY</button>
                </div>
                <button onclick="emailClient()" style="background:#222; color:#fff; border:1px solid #444; margin-bottom:5px;">📧 EMAIL UPDATE</button>
                <button onclick="copyLink()" style="background:#222; color:#fff; border:1px solid #444;">🔗 COPY LINK</button>
            </div>
            <div class="panel">
                <h3>FILES</h3>
                <div id="fList">Select a client.</div>
                <button onclick="document.getElementById('fUp').click()" style="width:auto; margin-top:10px; background:#333; color:#fff;">+ UPLOAD FILE</button>
                <input type="file" id="fUp" hidden multiple onchange="up(this.files)">
            </div>
            <div class="panel" style="flex:1;">
                <h3>CHAT</h3>
                <div id="chatFeed"></div>
                <div style="display:flex; gap:5px;"><input id="mIn" placeholder="Type message..." onkeypress="if(event.key==='Enter') snd()"><button onclick="snd()" style="width:80px;">SEND</button></div>
            </div>
        </div>
    </div>

    <div id="view-leads" class="view-panel">
        <div class="col-left">
            <div class="panel"><h3 style="color:#d900ff
