name: Deploy Node App to Azure Web App (Build in CI)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  NODE_VERSION: '20' # Use an LTS. Align with your package.json "engines" if set.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies (production)
        run: npm ci --omit=dev

      # If you have a build step (front-end bundling, etc.)
      - name: 🏗️ Build
        run: |
          if [ -f package.json ] && jq -e '.scripts.build' package.json > /dev/null; then
            npm run build
          else
            echo "No build script found; skipping."
          fi

      - name: 🧪 (Optional) Test
        run: |
          if jq -e '.scripts.test' package.json > /dev/null; then
            npm test --if-present
          else
            echo "No test script found; skipping."
          fi

      - name: 🗜️ Archive files for deploy (include node_modules)
        run: |
          # Adjust paths if you deploy a subfolder. This zips the project root.
          zip -r release.zip . -x ".git/*" ".github/*" "node_modules/.cache/*"

      - name: 🔐 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # Alternative: use publish profile in next step if you prefer not to use a Service Principal

      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: release.zip
          # Alternative auth (no azure/login step needed):
          # publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: ✅ Post-deploy sanity
        run: |
          echo "Deployed. Ensure your start script points to platinum_server.js."
